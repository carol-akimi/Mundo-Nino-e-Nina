<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Mundo Nino & Nina</title>
    <meta name="description" content="Catálogo de roupas infantis com filtro por categoria e ordenação por preço.">
    <link rel="icon" href="data/logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="vitrine">

    <div id="global-header"></div>

    <main class="container">
        
        <a href="#" class="btn-back" onclick="event.preventDefault(); history.back();">&larr; Voltar</a>

        <div class="vitrine-header">

        </div>

        </div>

    <div id="global-footer"></div>

    <script src="js/components.js"></script>
