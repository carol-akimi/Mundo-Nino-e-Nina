<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Lojista</title>
    <meta name="description" content="Painel administrativo da Mundo Nino & Nina.">
    <meta name="robots" content="noindex">
    <link rel="icon" href="data/logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body class="admin-body">

    <header class="admin-topbar">
        <h1 class="admin-topbar-logo">Painel Gerencial</h1>
        <a href="index.html" class="admin-back-link">Voltar para o site</a>
    </header>

    <main class="admin-container">
        <!-- tela de login -->
        <div id="login-section" class="admin-card login-card">
            <h2>Acesso Restrito</h2>
            <p class="admin-subtitle">Insira a senha do projeto: lojista123</p>
            <div class="login-action">
                <input type="password" id="pass-input" placeholder="Sua senha..." autocomplete="off"
                    class="admin-input">
                <button id="btn-login" class="admin-btn admin-btn--primary admin-btn--lg">Entrar</button>
            </div>
        </div>

        <!-- painel central -->
        <div id="admin-panel" class="hidden">

            <!-- cadastro de produto -->
            <div class="admin-card">
                <h3 class="admin-card-heading">Cadastrar Novo Produto</h3>
                <form id="form-novo" class="form-group-container">
                    <label class="form-image" title="Upload de imagem (Mocape)">
                        <input type="file" id="novo-imagem-upload" accept="image/*" class="hidden">
                        <span>+ Imagem</span>
                    </label>
                    <div class="form-group">
                        <label>Nome da Peça:</label>
                        <input type="text" id="novo-nome" class="admin-input" required>
                    </div>
                    <div class="form-group-small">
                        <label>Preço (R$):</label>
                        <input type="number" id="novo-preco" step="0.01" class="admin-input no-spin" required>
                    </div>
                    <div class="form-group-medium">
                        <label>Gênero:</label>
                        <select id="novo-genero" class="admin-input">
                            <option value="menino">Menino</option>
                            <option value="menina">Menina</option>
                        </select>
                    </div>
                    <div class="form-group-medium form-group-category">
                        <label>Categoria:</label>
                        <select id="novo-categoria-select" class="admin-input" onchange="toggleNovaCategoria()">
                            <!-- preenchido dinamicamente -->
                        </select>
                        <input type="text" id="novo-categoria-input" class="admin-input new-category-input hidden"
                            placeholder="Nova Categoria">
                    </div>
                    <div class="form-group form-group-full">
                        <label>Descrição:</label>
                        <textarea id="novo-descricao" class="admin-input admin-textarea" rows="2"
                            placeholder="Detalhes da peça..." required></textarea>
                    </div>
                    <button type="submit" class="admin-btn admin-btn--success admin-btn--lg admin-form-submit">+
                        Adicionar</button>
                </form>
            </div>

            <div class="search-container">
                <h3>Roupas Cadastradas</h3>
                <input type="text" id="search-product" class="search-bar" placeholder="Buscar produto..."
                    onkeyup="filtrarProdutos()">
            </div>
            <div id="admin-products-list"></div>

        </div>
    </main>

    <script src="js/admin.js"></script>
</body>

</html>
